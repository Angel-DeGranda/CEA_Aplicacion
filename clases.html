    <div class="container">
        <div class="card">
            <h2>📖 Crear Nueva Clase</h2>
            <form id="form-curso">
                <input type="text" id="cu-nombre" placeholder="Nombre de la Clase" required>
                <input type="text" id="cu-horario" placeholder="Horario (Ej: Lun y Mie 16:00 - 18:00)" required>
                <select id="select-maestro-asignado" required><option value="">Asignar Maestro Responsable</option></select>
                <button type="submit">Crear Clase</button>
            </form>
        </div>
    </div>
