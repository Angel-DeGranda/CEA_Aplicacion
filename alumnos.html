    <div class="container">
        <div class="card">
            <h2>Registro de Alumno</h2>
            <form id="form-alumno">
                <label for="buscar-tutor">Padre/Tutor responsable:</label>
                <div class="autocomplete-wrapper">
                    <input type="text" id="buscar-tutor" placeholder="Escribe el nombre del cliente..." autocomplete="off">
                    <input type="hidden" id="al-tutor-id">
                    <ul id="lista-tutores"></ul>
                </div>
                <label for="al-nombre">Nombre del alumno:</label>
                <input type="text" id="al-nombre" placeholder="Nombre completo" required>
                <label for="al Fecha">Fecha de nacimiento:</label>
                <input type="date" id="al-fecha" required>
                <button type="submit" class="button-form">Agregar Alumno</button>
            </form>
        </div>
