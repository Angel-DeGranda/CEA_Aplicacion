<body>

    <div class="container">
        <div class="card">
            <h2>Registro de Clientes</h2>
            <form id="form-cliente">
                <label for="al-nombre">Nombre del cliente:</label>
                <input type="text" id="al-nombre" placeholder="Nombre completo" required>
                <label for="al-fecha">Fecha de nacimiento:</label>
                <input type="date" id="al-fecha" required>
                <label for="al-email">Correo del cliente:</label>
                <input type="email" id="al-email" placeholder="Email" required>
                <label for="al-telefono">Número de teléfono:</label>
                <input type="tel" id="al-telefono" placeholder="Teléfono" maxlength="10" required>
                <button type="submit" class="button-form">Agregar Cliente</button>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
