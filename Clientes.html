        <div class="card">
            <h2>Registro de Clientes</h2>
            <form id="form-cliente">
                <input type="text" id="al-nombre" placeholder="Nombre completo" required>
                <label>Fecha de nacimiento:</label>
                <input type="date" id="al-fecha" required>
                <input type="email" id="al-email" placeholder="Email" required>
                <input type="tel" id="al-telefono" placeholder="Teléfono" maxlength="10">
                <button type="submit">Agregar Cliente</button>
            </form>
        </div>
